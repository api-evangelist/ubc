---
aid: ubc
name: University of British Columbia
description: >-
  The University of British Columbia (UBC) is a public research university in
  Vancouver and Kelowna, British Columbia, Canada, ranked #33 in the QS World
  University Rankings 2025. UBC's public developer footprint is led by UBC
  Library, which operates the Open Collections API (an ElasticSearch-backed
  REST API over digitized collections) and the Abacus Dataverse research-data
  repository (a standard Dataverse REST API), along with an OAI-PMH harvesting
  endpoint. Institutional/enterprise data APIs are delivered through the Office
  of the CIO's Integration Enablement Centre via MuleSoft and a Data Access
  Framework, which are gated behind a formal data access request rather than a
  self-service public developer portal.
type: Index
position: Consumer
access: 3rd-Party
