reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      UBC has a real, working public API footprint concentrated in UBC Library.
      The Open Collections API at oc-index.library.ubc.ca was verified live,
      returning structured JSON ("API Version: 1") for both /search/8.5/ and
      /collections, with no API key required for reads. The Abacus Dataverse
      research-data repository was verified running Dataverse 5.9 with the
      standard Dataverse REST API responding OK. An OAI-PMH endpoint on
      open.library.ubc.ca resolved. Enterprise/institutional data is delivered
      via the CIO's Integration Enablement Centre over MuleSoft and a Data
      Access Framework, but this is gated behind a formal data access request
      and has no self-service public developer portal. The official Open
      Collections /docs human page was repeatedly served a bot-block ("unusual
      activity") page during automated probing, so docs content was confirmed
      via the ubc-library GitHub docs repo instead. No public, documented
      course/timetable/SIS API was found from UBC itself (only third-party
      community scrapers). Rating reflects solid library/research APIs but
      gated institutional data and an inconsistently reachable docs site. No
      endpoints fabricated; only live-probed URLs reported.
